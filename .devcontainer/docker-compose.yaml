volumes:
  postgres-data:
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_PASSWORD: P@ssw0rd!
      POSTGRES_USER: localdbuser
      POSTGRES_DB: localdb
      POSTGRES_HOSTNAME: db

    volumes:
      - ../..:/workspaces:cached
    command: sleep infinity
    depends_on:
      - db
  db:
    image: postgres:17
    pull_policy: if_not_present
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: P@ssw0rd!
      POSTGRES_USER: localdbuser
      POSTGRES_DB: localdb
